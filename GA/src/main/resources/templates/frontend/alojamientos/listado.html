<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alojamientos | Gestión Alojamientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/frontend/css/styles.css}">
</head>
<body class="bg-light">
<div th:replace="~{frontend/fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
        <div>
            <p class="text-primary fw-semibold mb-2">Alojamientos</p>
            <h1 class="h2 fw-semibold mb-1">Alojamientos disponibles</h1>
            <p class="text-secondary mb-0">Explorá las opciones activas para tu próxima reserva.</p>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/home}">Volver al inicio</a>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(alojamientos)}">
        Todavía no hay alojamientos activos para mostrar.
    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(alojamientos)}">
        <div class="col-md-6 col-xl-4" th:each="alojamiento : ${alojamientos}">
            <article class="card h-100 shadow-sm border-0">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between gap-3 mb-3">
                        <span class="badge text-bg-primary" th:text="${alojamiento.tipoInmueble}">CASA</span>
                        <span class="fw-semibold text-primary" th:text="|$ ${alojamiento.precioNoche}|">$ 0.00</span>
                    </div>

                    <h2 class="h5 card-title" th:text="${alojamiento.titulo}">Título del alojamiento</h2>
                    <p class="card-text text-secondary"
                       th:text="${alojamiento.descripcion != null and #strings.length(alojamiento.descripcion) > 140 ? #strings.substring(alojamiento.descripcion, 0, 140) + '...' : alojamiento.descripcion}">
                        Descripción corta del alojamiento.
                    </p>

                    <div class="text-secondary small mb-3" th:with="direccion=${alojamiento.direccion}" th:if="${direccion != null}">
                        <span th:text="${direccion.ciudad}">Ciudad</span>
                        <span th:if="${direccion.calle != null}"> · </span>
                        <span th:if="${direccion.calle != null}" th:text="|${direccion.calle} ${direccion.altura}|">Dirección</span>
                    </div>

                    <div class="row g-2 small text-secondary mb-4">
                        <div class="col-6">
                            <span class="d-block fw-semibold text-dark" th:text="${alojamiento.capacidad}">2</span>
                            huéspedes
                        </div>
                        <div class="col-6">
                            <span class="d-block fw-semibold text-dark" th:text="${alojamiento.cantHabitaciones}">1</span>
                            habitaciones
                        </div>
                    </div>

                    <a class="btn btn-primary mt-auto" th:href="@{/alojamientos/{id}(id=${alojamiento.id})}">
                        Ver detalle
                    </a>
                </div>
            </article>
        </div>
    </div>
</main>

</body>
</html>
