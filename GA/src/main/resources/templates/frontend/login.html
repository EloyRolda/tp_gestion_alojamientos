<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión | Gestión Alojamientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/frontend/css/styles.css}">
</head>
<body class="bg-light">
<div th:replace="~{frontend/fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 mb-2 text-center">Iniciar sesión</h1>
                    <p class="text-secondary text-center mb-4">Ingresá con tu email y contraseña.</p>

                    <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>
                    <div class="alert alert-success" role="alert" th:if="${exito}" th:text="${exito}"></div>

                    <form th:action="@{/login}" th:object="${usuarioLoginDTO}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" id="email"
                                   placeholder="nombre@email.com" autocomplete="email">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" id="password"
                                   placeholder="Tu contraseña" autocomplete="current-password">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        ¿No tenés cuenta?
                        <a th:href="@{/registro}">Crear cuenta</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
