<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reservar | Gestión Alojamientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/frontend/css/styles.css}">
</head>
<body class="bg-light">
<div th:replace="~{frontend/fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <section class="bg-white rounded-3 shadow-sm p-4 p-md-5">
        <p class="text-primary fw-semibold mb-2">Reserva</p>
        <h1 class="h2 fw-semibold mb-3">Formulario de reserva</h1>
        <p class="lead text-secondary mb-4">
            Esta ruta ya queda preparada para implementar la reserva de
            <strong th:text="${alojamiento.titulo}">alojamiento</strong>.
        </p>

        <a class="btn btn-outline-primary" th:href="@{/alojamientos/{id}(id=${alojamiento.id})}">
            Volver al detalle
        </a>
    </section>
</main>

</body>
</html>
