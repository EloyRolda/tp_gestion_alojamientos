<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home | Gestión Alojamientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/frontend/css/styles.css}">
</head>
<body class="bg-light">
<div th:replace="~{frontend/fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <section class="bg-white rounded-3 shadow-sm p-4 p-md-5">
        <p class="text-primary fw-semibold mb-2">Inicio</p>
        <h1 class="display-6 fw-semibold mb-3">
            Bienvenido/a, <span th:text="${usuario.nombre}">usuario</span>
        </h1>
        <p class="lead text-secondary mb-4">
            Este es el home inicial del frontend. Desde acá se pueden sumar las próximas pantallas de alojamientos,
            reservas y perfil.
        </p>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="border rounded-3 p-3 h-100">
                    <span class="text-secondary small">Email</span>
                    <p class="mb-0 fw-semibold" th:text="${usuario.email}">email</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border rounded-3 p-3 h-100">
                    <span class="text-secondary small">Tipo de usuario</span>
                    <p class="mb-0 fw-semibold" th:text="${usuario.tipoUsuario}">CLIENTE</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border rounded-3 p-3 h-100">
                    <span class="text-secondary small">Estado</span>
                    <p class="mb-0 fw-semibold" th:text="${usuario.activo} ? 'Activo' : 'Inactivo'">Activo</p>
                </div>
            </div>
        </div>
    </section>
</main>

</body>
</html>
