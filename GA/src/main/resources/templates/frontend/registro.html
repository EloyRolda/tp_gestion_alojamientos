<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | Gestión Alojamientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/frontend/css/styles.css}">
</head>
<body class="bg-light">
<div th:replace="~{frontend/fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 mb-2 text-center">Crear cuenta</h1>
                    <p class="text-secondary text-center mb-4">Registrate como cliente para empezar a usar la plataforma.</p>

                    <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

                    <form th:action="@{/registro}" th:object="${clienteRegistroDTO}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" th:field="*{nombre}" class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" id="nombre"
                                       placeholder="Tu nombre" autocomplete="name">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="text" th:field="*{telefono}" class="form-control"
                                       th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid' : ''" id="telefono"
                                       placeholder="Tu teléfono" autocomplete="tel">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" id="email"
                                       placeholder="nombre@email.com" autocomplete="email">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" th:field="*{password}" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" id="password"
                                       placeholder="Elegí una contraseña" autocomplete="new-password">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>

                            <div class="col-12">
                                <label for="metodoPago" class="form-label">Método de pago</label>
                                <input type="text" th:field="*{metodoPago}" class="form-control"
                                       th:classappend="${#fields.hasErrors('metodoPago')} ? 'is-invalid' : ''" id="metodoPago"
                                       placeholder="Ej: tarjeta, transferencia, efectivo">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('metodoPago')}" th:errors="*{metodoPago}"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-4">Registrarme</button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        ¿Ya tenés cuenta?
                        <a th:href="@{/login}">Iniciar sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
