<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Departamento</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0f1e; --surface: #111827; --border: #1e2d45; --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.2); --text: #e2e8f0; --muted: #64748b; --error: #f87171; --success: #4ade80; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; padding: 40px 20px; }
        body::before { content: ''; position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%); top: -150px; right: -150px; pointer-events: none; }
        .container { max-width: 720px; margin: 0 auto; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
        .back-link:hover { color: var(--text); }
        .page-title { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 6px; }
        .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; margin-bottom: 16px; }
        .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field { margin-bottom: 4px; }
        .field.full { grid-column: 1 / -1; }
        label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
        input[type="text"], input[type="number"], textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        input::placeholder, textarea::placeholder { color: var(--muted); }
        textarea { resize: vertical; min-height: 100px; }
        .checks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .check-item input[type="checkbox"] { display: none; }
        .check-item label { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 10px 14px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); text-transform: none; letter-spacing: 0; transition: border-color 0.2s, color 0.2s; }
        .check-item input[type="checkbox"]:checked + label { border-color: var(--accent); color: var(--text); box-shadow: 0 0 0 3px var(--accent-glow); }
        .check-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.2s; flex-shrink: 0; }
        .check-item input[type="checkbox"]:checked + label .check-dot { background: var(--accent); }
        .msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 20px; display: none; }
        .msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
        .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
        .btn { width: 100%; background: linear-gradient(135deg, #6366f1, var(--accent)); border: none; border-radius: 10px; padding: 14px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 8px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .logout-link { color: #fca5a5; text-decoration: none; font-size: 14px; transition: color 0.2s; }
        .logout-link:hover { color: #f87171; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header-actions">
        <a href="/home.html" class="back-link">← Volver al panel</a>
        <a href="#" onclick="cerrarSesion()" class="logout-link">Cerrar sesión</a>
    </div>
    <div class="page-title">🏢 Registrar Departamento</div>
    <p class="page-sub">Completá los datos para publicar un nuevo departamento</p>

    <div class="msg" id="msg"></div>

    <div class="card">
        <div class="section-title">Información general</div>
        <div class="grid">
            <div class="field full"><label for="titulo">Título</label><input type="text" id="titulo" placeholder="Ej: Depto moderno en el centro"></div>
            <div class="field full"><label for="descripcion">Descripción</label><textarea id="descripcion" placeholder="Describí el departamento..."></textarea></div>
            <div class="field"><label for="precioNoche">Precio por noche ($)</label><input type="number" id="precioNoche" placeholder="0" min="0"></div>
            <div class="field"><label for="capacidad">Capacidad (personas)</label><input type="number" id="capacidad" placeholder="1" min="1"></div>
            <div class="field"><label for="cantAmbientes">Ambientes</label><input type="number" id="cantAmbientes" placeholder="1" min="1"></div>
            <div class="field"><label for="cantHabitaciones">Habitaciones</label><input type="number" id="cantHabitaciones" placeholder="0" min="0"></div>
            <div class="field"><label for="cantCamas">Camas</label><input type="number" id="cantCamas" placeholder="0" min="0"></div>
            <div class="field"><label for="cantBanios">Baños</label><input type="number" id="cantBanios" placeholder="0" min="0"></div>
            <div class="field"><label for="piso">Piso</label><input type="number" id="piso" placeholder="1" min="0"></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Características del departamento</div>
        <div class="checks-grid">
            <div class="check-item"><input type="checkbox" id="tieneAscensor"><label for="tieneAscensor"><span class="check-dot"></span>Ascensor</label></div>
            <div class="check-item"><input type="checkbox" id="expensasIncluidas"><label for="expensasIncluidas"><span class="check-dot"></span>Expensas incluidas</label></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Servicios incluidos</div>
        <div class="checks-grid">
            <div class="check-item"><input type="checkbox" id="tieneWifi"><label for="tieneWifi"><span class="check-dot"></span>WiFi</label></div>
            <div class="check-item"><input type="checkbox" id="tieneCocina"><label for="tieneCocina"><span class="check-dot"></span>Cocina</label></div>
            <div class="check-item"><input type="checkbox" id="tieneLavarropa"><label for="tieneLavarropa"><span class="check-dot"></span>Lavarropa</label></div>
            <div class="check-item"><input type="checkbox" id="tieneEstacionamiento"><label for="tieneEstacionamiento"><span class="check-dot"></span>Estacionamiento</label></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Dirección</div>
        <div class="grid">
            <div class="field"><label for="pais">País</label><input type="text" id="pais" placeholder="Argentina"></div>
            <div class="field"><label for="provincia">Provincia</label><input type="text" id="provincia" placeholder="Buenos Aires"></div>
            <div class="field"><label for="ciudad">Ciudad</label><input type="text" id="ciudad" placeholder="Mar del Plata"></div>
            <div class="field"><label for="codigoPostal">Código Postal</label><input type="text" id="codigoPostal" placeholder="7600"></div>
            <div class="field"><label for="calle">Calle</label><input type="text" id="calle" placeholder="Av. Colón"></div>
            <div class="field"><label for="altura">Altura</label><input type="number" id="altura" placeholder="1234" min="0"></div>
        </div>
    </div>

    <button class="btn" id="submitBtn" onclick="enviar()">Publicar departamento</button>
</div>

<script>
    // ==================== GUARD DE AUTENTICACIÓN ====================
    if (!localStorage.getItem('token')) {
        window.location.href = '/login.html';
    }

    // ==================== CERRAR SESIÓN ====================
    function cerrarSesion() {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
    }

    let idAnfitrion = null;
    fetch('/Usuario/me', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } }).then(r => r.json()).then(u => { idAnfitrion = u.id; }).catch(() => {});

    async function enviar() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        msg.style.display = 'none';

        const datos = {
            idAnfitrion,
            titulo:               document.getElementById('titulo').value,
            descripcion:          document.getElementById('descripcion').value,
            precioNoche:          parseFloat(document.getElementById('precioNoche').value),
            capacidad:            parseInt(document.getElementById('capacidad').value),
            cantAmbientes:        parseInt(document.getElementById('cantAmbientes').value),
            cantHabitaciones:     parseInt(document.getElementById('cantHabitaciones').value),
            cantCamas:            parseInt(document.getElementById('cantCamas').value),
            cantBanios:           parseInt(document.getElementById('cantBanios').value),
            piso:                 parseInt(document.getElementById('piso').value),
            tieneAscensor:        document.getElementById('tieneAscensor').checked,
            expensasIncluidas:    document.getElementById('expensasIncluidas').checked,
            tieneWifi:            document.getElementById('tieneWifi').checked,
            tieneCocina:          document.getElementById('tieneCocina').checked,
            tieneLavarropa:       document.getElementById('tieneLavarropa').checked,
            tieneEstacionamiento: document.getElementById('tieneEstacionamiento').checked,
            pais:                 document.getElementById('pais').value,
            provincia:            document.getElementById('provincia').value,
            ciudad:               document.getElementById('ciudad').value,
            codigoPostal:         document.getElementById('codigoPostal').value,
            calle:                document.getElementById('calle').value,
            altura:               parseInt(document.getElementById('altura').value),
        };

        btn.disabled = true; btn.textContent = 'Publicando...';
        try {
            const resp = await fetch('/Departamento/registrar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body: JSON.stringify(datos)
            });
            const texto = await resp.text();
            msg.className = resp.ok ? 'msg success' : 'msg error';
            msg.textContent = resp.ok ? '¡Departamento publicado correctamente!' : 'Error: ' + texto;
        } catch {
            msg.className = 'msg error'; msg.textContent = 'No se pudo conectar con el servidor.';
        }
        msg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Publicar departamento';
    }
</script>
</body>
</html>
