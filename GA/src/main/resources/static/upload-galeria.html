<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir fotos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2435;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --text: #e2e8f0;
            --muted: #64748b;
            --error: #f87171;
            --success: #4ade80;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%);
            top: -100px; left: -100px;
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
        }

        .counter {
            font-size: 13px;
            color: var(--muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 20px;
        }
        .drop-zone:hover,
        .drop-zone.over {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .drop-zone .dz-icon { font-size: 36px; margin-bottom: 10px; }
        .drop-zone .dz-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .drop-zone .dz-sub { font-size: 12px; color: var(--muted); }

        /* Preview grid */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: fadeUp 0.25s ease both;
        }

        .preview-item img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: 5px; right: 5px;
            background: rgba(0,0,0,0.75);
            border: none;
            border-radius: 50%;
            width: 24px; height: 24px;
            color: #fca5a5;
            cursor: pointer;
            font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .preview-item .remove-btn:hover { background: rgba(127,29,29,0.8); }

        .preview-item .upload-status {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        /* Botones */
        .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-skip {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 22px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-skip:hover { border-color: var(--muted); color: var(--text); }
        .btn-skip:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-upload {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border: none;
            border-radius: 10px;
            padding: 11px 26px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-upload:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Mensaje */
        .msg {
            display: none;
            text-align: center;
            font-size: 13px;
            margin-top: 14px;
            padding: 10px 16px;
            border-radius: 8px;
        }
        .msg.success { background: rgba(74,222,128,0.1); color: var(--success); border: 1px solid rgba(74,222,128,0.2); }
        .msg.error   { background: rgba(248,113,113,0.1); color: var(--error);   border: 1px solid rgba(248,113,113,0.2); }

        /* Progress bar */
        .progress-bar-wrap {
            display: none;
            background: var(--surface2);
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #6366f1);
            border-radius: 99px;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h1>📷 Subir fotos</h1>
        <span class="counter" id="counter">0 / 10</span>
    </div>
    <p class="subtitle">
        Tu alojamiento fue creado. Ahora podés agregar hasta 10 fotos.<br>
        También podés omitir este paso y subir fotos más tarde.
    </p>

    <div class="drop-zone" id="dropZone"
         onclick="document.getElementById('fileInput').click()"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)">
        <div class="dz-icon">🖼️</div>
        <div class="dz-title">Hacé click o arrastrá imágenes aquí</div>
        <div class="dz-sub">JPG, PNG, WEBP — máx. 10 fotos</div>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple style="display:none"
           onchange="agregarArchivos(this.files)">

    <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <div class="actions">
        <button class="btn-skip" id="btnSkip" onclick="omitir()">Omitir por ahora</button>
        <button class="btn-upload" id="btnUpload" onclick="subirFotos()">Subir fotos</button>
    </div>

    <div class="msg" id="msg"></div>
</div>

<script>
    // ── GUARD ──
    if (!localStorage.getItem('token')) {
        window.location.href = '/login.html';
    }

    const PLACEHOLDER_URL = "https://www.google.com/url?sa=t&source=web&rct=j&url=https%3A%2F%2Fes.wikipedia.org%2Fwiki%2FArchivo%3AImage-not-found.png&opi=89978449"; // <-- reemplazá con tu URL
    const PLACEHOLDER_ALT = 'Sin fotos de referencia';

    const params    = new URLSearchParams(location.search);
    const galleryId = params.get('galleryId');

    if (!galleryId) {
        window.location.href = '/listar-alojamientos.html';
    }

    let queue = []; // { file, alt, objectUrl, status: null | 'ok' | 'error' }

    // ── DRAG & DROP ──
    function onDragOver(e) {
        e.preventDefault();
        document.getElementById('dropZone').classList.add('over');
    }
    function onDragLeave(e) {
        document.getElementById('dropZone').classList.remove('over');
    }
    function onDrop(e) {
        e.preventDefault();
        document.getElementById('dropZone').classList.remove('over');
        agregarArchivos(e.dataTransfer.files);
    }

    function agregarArchivos(files) {
        const disponibles = 10 - queue.length;
        if (disponibles <= 0) return;
        Array.from(files).slice(0, disponibles).forEach(file => {
            queue.push({
                file,
                alt: file.name.replace(/\.[^.]+$/, ''),
                objectUrl: URL.createObjectURL(file),
                status: null
            });
        });
        renderPreviews();
    }

    function renderPreviews() {
        document.getElementById('counter').textContent = `${queue.length} / 10`;
        const grid = document.getElementById('previewGrid');
        if (queue.length === 0) { grid.innerHTML = ''; return; }
        grid.innerHTML = queue.map((f, i) => `
            <div class="preview-item">
                <img src="${f.objectUrl}" alt="${f.alt}">
                ${f.status === null ? `
                    <button class="remove-btn" onclick="quitarFoto(${i})">✕</button>
                ` : ''}
                ${f.status === 'ok'    ? `<div class="upload-status">✅</div>` : ''}
                ${f.status === 'error' ? `<div class="upload-status">❌</div>` : ''}
            </div>
        `).join('');
    }

    function quitarFoto(i) {
        URL.revokeObjectURL(queue[i].objectUrl);
        queue.splice(i, 1);
        renderPreviews();
    }

    // ── SUBIR FOTOS ──
    async function subirFotos() {
        if (queue.length === 0) {
            mostrarMsg('Agregá al menos una foto o usá "Omitir".', 'error');
            return;
        }

        setBloqueado(true);
        document.getElementById('progressWrap').style.display = 'block';

        let exitosas = 0;
        for (let i = 0; i < queue.length; i++) {
            const foto = queue[i];
            const fd = new FormData();
            fd.append('file', foto.file);
            fd.append('alt', foto.alt);
            fd.append('galleryId', galleryId);

            try {
                const r = await fetch('/gallery/upload', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: fd
                });
                queue[i].status = r.ok ? 'ok' : 'error';
                if (r.ok) exitosas++;
            } catch {
                queue[i].status = 'error';
            }

            // Actualizar progress y previews
            document.getElementById('progressFill').style.width = `${((i + 1) / queue.length) * 100}%`;
            renderPreviews();
        }

        if (exitosas === queue.length) {
            mostrarMsg(`✅ ${exitosas} foto${exitosas > 1 ? 's' : ''} subida${exitosas > 1 ? 's' : ''} correctamente.`, 'success');
            setTimeout(() => window.location.href = '/listar-alojamientos.html', 1500);
        } else {
            mostrarMsg(`⚠️ ${exitosas} de ${queue.length} fotos subidas. Las marcadas en rojo fallaron.`, 'error');
            setBloqueado(false);
        }
    }

    // ── OMITIR → sube placeholder ──
    async function omitir() {
        setBloqueado(true);

        try {
            // Convertimos la URL del placeholder a un File
            const response = await fetch(PLACEHOLDER_URL);
            const blob     = await response.blob();
            const file     = new File([blob], 'sin-fotos.jpg', { type: blob.type });

            const fd = new FormData();
            fd.append('file', file);
            fd.append('alt', PLACEHOLDER_ALT);
            fd.append('galleryId', galleryId);

            await fetch('/gallery/upload', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                body: fd
            });
        } catch {
            // Si falla la subida del placeholder igual redirigimos
        }

        window.location.href = '/listar-alojamientos.html';
    }

    // ── HELPERS ──
    function setBloqueado(val) {
        document.getElementById('btnUpload').disabled = val;
        document.getElementById('btnSkip').disabled   = val;
        if (val) {
            document.getElementById('btnUpload').textContent = 'Subiendo...';
        } else {
            document.getElementById('btnUpload').textContent = 'Subir fotos';
        }
    }

    function mostrarMsg(texto, tipo) {
        const el = document.getElementById('msg');
        el.textContent = texto;
        el.className = `msg ${tipo}`;
        el.style.display = 'block';
    }
</script>
</body>
</html>
