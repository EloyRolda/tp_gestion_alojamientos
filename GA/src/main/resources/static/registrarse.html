<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --text: #e2e8f0;
            --muted: #64748b;
            --error: #f87171;
            --success: #4ade80;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            top: -200px; right: -200px;
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #6366f1, var(--accent));
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 16px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        input, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder { color: var(--muted); }
        select option { background: var(--surface); }

        /* Campo de método de pago (oculto por defecto) */
        #campoPago {
            display: none;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 0;
            max-height: 0;
        }

        #campoPago.visible {
            display: block;
            opacity: 1;
            max-height: 120px;
        }

        .pago-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pago-option {
            flex: 1;
            min-width: 80px;
        }

        .pago-option input[type="radio"] {
            display: none;
        }

        .pago-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            text-transform: none;
            letter-spacing: 0;
            transition: border-color 0.2s, color 0.2s;
            text-align: center;
        }

        .pago-option input[type="radio"]:checked + label {
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .pago-option label:hover {
            border-color: #2d4f7a;
            color: var(--text);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, var(--accent));
            border: none;
            border-radius: 10px;
            padding: 14px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }

        .msg {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .msg.error {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            color: var(--error);
        }

        .msg.success {
            background: rgba(74,222,128,0.1);
            border: 1px solid rgba(74,222,128,0.3);
            color: var(--success);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-icon">✨</div>
        <h1>Crear cuenta</h1>
        <p class="subtitle">Completá tus datos para registrarte</p>
    </div>

    <div class="msg" id="feedbackMsg"></div>

    <form id="registroForm">

        <div class="field">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
        </div>

        <div class="field">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="field">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: +54 9 11 1234-5678" required>
        </div>

        <div class="field">
            <label for="tipoUsuario">Tipo de usuario</label>
            <select id="tipoUsuario" name="tipoUsuario" required>
                <option value="" disabled selected>Seleccioná un rol</option>
                <option value="CLIENTE">Cliente</option>
                <option value="ANFITRION">Anfitrión</option>
            </select>
        </div>

        <!-- Método de pago — solo visible para CLIENTE -->
        <div class="field" id="campoPago">
            <label>Método de pago</label>
            <div class="pago-options">
                <div class="pago-option">
                    <input type="radio" id="pago-visa" name="metodoPago" value="VISA">
                    <label for="pago-visa">💳 Visa</label>
                </div>
                <div class="pago-option">
                    <input type="radio" id="pago-master" name="metodoPago" value="MASTERCARD">
                    <label for="pago-master">💳 Mastercard</label>
                </div>
                <div class="pago-option">
                    <input type="radio" id="pago-efectivo" name="metodoPago" value="EFECTIVO">
                    <label for="pago-efectivo">💵 Efectivo</label>
                </div>
            </div>
        </div>

        <button class="btn" type="submit" id="submitBtn">Crear cuenta</button>

    </form>

    <div class="footer-link">
        ¿Ya tenés cuenta? <a href="/login.html">Iniciá sesión</a>
    </div>
</div>

<script>
    // Mostrar/ocultar el campo de método de pago según el tipo de usuario
    document.getElementById('tipoUsuario').addEventListener('change', function () {
        const campoPago = document.getElementById('campoPago');
        if (this.value === 'CLIENTE') {
            campoPago.style.display = 'block';
            // Pequeño timeout para que la transición CSS funcione bien
            setTimeout(() => campoPago.classList.add('visible'), 10);
        } else {
            campoPago.classList.remove('visible');
            setTimeout(() => campoPago.style.display = 'none', 300);
            // Deseleccionar radio buttons
            document.querySelectorAll('input[name="metodoPago"]').forEach(r => r.checked = false);
        }
    });

    document.getElementById("registroForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const btn = document.getElementById("submitBtn");
        const msg = document.getElementById("feedbackMsg");
        const tipoUsuario = document.getElementById("tipoUsuario").value;

        // Validar método de pago si es CLIENTE
        if (tipoUsuario === 'CLIENTE') {
            const metodoPago = document.querySelector('input[name="metodoPago"]:checked');
            if (!metodoPago) {
                msg.className = "msg error";
                msg.textContent = "Por favor seleccioná un método de pago.";
                msg.style.display = "block";
                return;
            }
        }

        const metodoPago = document.querySelector('input[name="metodoPago"]:checked');

        const datos = {
            nombre:      document.getElementById("nombre").value,
            email:       document.getElementById("email").value,
            password:    document.getElementById("password").value,
            telefono:    document.getElementById("telefono").value,
            tipoUsuario: tipoUsuario,
            metodoPago:  metodoPago ? metodoPago.value : null
        };

        btn.disabled = true;
        btn.textContent = "Registrando...";

        try {
            const response = await fetch("/Usuario/registrar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datos)
            });

            const texto = await response.text();

            if (response.ok) {
                msg.className = "msg success";
                msg.textContent = "¡Cuenta creada! Redirigiendo al login...";
                msg.style.display = "block";
                setTimeout(() => window.location.href = "/login.html", 1800);
            } else {
                msg.className = "msg error";
                msg.textContent = "Error: " + texto;
                msg.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Crear cuenta";
            }

        } catch (error) {
            msg.className = "msg error";
            msg.textContent = "No se pudo conectar con el servidor.";
            msg.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Crear cuenta";
        }
    });
</script>

</body>
</html>
