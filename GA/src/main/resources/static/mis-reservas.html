<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2435;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --text: #e2e8f0;
            --muted: #64748b;
            --error: #f87171;
            --delete: #7f1d1d;
            --delete-text: #fca5a5;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 10;
        }
        .btn-edit {
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            color: #93c5fd;
            border-radius: 7px;
            padding: 7px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }
        .btn-edit:hover {
            background: rgba(59,130,246,0.22);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .app-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; }
        .btn-back {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; cursor: pointer;
            text-decoration: none; display: inline-block;
            transition: all 0.2s;
        }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); }

        /* ── MAIN ── */
        main { padding: 32px; max-width: 900px; margin: 0 auto; }

        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
        }
        .page-title { font-family: 'Playfair Display', serif; font-size: 24px; }

        /* ── LOADING ── */
        #loadingOverlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.3s;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ERROR ── */
        .error-banner {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 10px; padding: 12px 16px;
            color: var(--error); font-size: 14px;
            margin-bottom: 24px; display: none;
        }

        /* ── FILTROS ── */
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 16px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .filter-btn:hover { border-color: #2d3f5c; color: var(--text); }
        .filter-btn.active {
            background: rgba(59,130,246,0.15);
            border-color: rgba(59,130,246,0.4);
            color: #93c5fd;
        }

        /* ── EMPTY ── */
        .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 15px; }

        /* ── RESERVA CARD ── */
        .reserva-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 14px;
            transition: border-color 0.2s;
            animation: fadeUp 0.4s ease both;
        }
        .reserva-card:hover { border-color: #2d3f5c; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .reserva-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 12px;
            margin-bottom: 10px;
        }

        .reserva-id {
            font-size: 11px; font-weight: 700;
            color: var(--muted); letter-spacing: 0.6px;
            text-transform: uppercase; margin-bottom: 4px;
        }
        .reserva-titulo { font-size: 16px; font-weight: 600; }

        /* Estado badges */
        .estado-badge {
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            letter-spacing: 0.5px; text-transform: uppercase;
            white-space: nowrap;
        }
        .estado-PENDIENTE  { background: rgba(251,191,36,0.15); color: #fde68a; border: 1px solid rgba(251,191,36,0.25); }
        .estado-CONFIRMADA { background: rgba(52,211,153,0.15); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.25); }
        .estado-CANCELADA  { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.25); }

        .reserva-details {
            display: flex; flex-wrap: wrap; gap: 16px;
            margin-top: 10px;
        }
        .detail-item { font-size: 13px; color: #94a3b8; }
        .detail-item span { color: var(--text); font-weight: 500; }

        .reserva-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

        .btn-cancel {
            background: rgba(127,29,29,0.35);
            border: 1px solid rgba(252,165,165,0.2);
            color: var(--delete-text);
            border-radius: 7px; padding: 7px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(127,29,29,0.55); }

        .btn-link {
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            color: #93c5fd;
            border-radius: 7px; padding: 7px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500;
            text-decoration: none; display: inline-flex;
            align-items: center; gap: 5px;
            transition: all 0.2s;
        }
        .btn-link:hover { background: rgba(59,130,246,0.22); }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<header>
    <div class="header-left">
        <div class="logo-icon">🏠</div>
        <span class="app-title">Gestión Alojamiento</span>
    </div>
    <a href="/home.html" class="btn-back">← Volver</a>
</header>

<main id="mainContent" style="display:none">
    <div class="page-header">
        <h1 class="page-title">📅 Mis Reservas</h1>
    </div>

    <div class="error-banner" id="mensaje"></div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filtrar('TODOS', this)">Todas</button>
        <button class="filter-btn" onclick="filtrar('PENDIENTE', this)">Pendientes</button>
        <button class="filter-btn" onclick="filtrar('CONFIRMADA', this)">Confirmadas</button>
        <button class="filter-btn" onclick="filtrar('CANCELADA', this)">Canceladas</button>
    </div>

    <div id="lista"></div>
</main>

<script>
    let reservas = [];
    let filtro = 'TODOS';
    function getTipoUrl(tipo) {
        if (!tipo) return 'casas';
        const t = tipo.toUpperCase();
        if (t === 'HOTEL') return 'hoteles';
        if (t === 'DEPARTAMENTO') return 'departamentos';
        if (t === 'CASA') return 'casas';
        return 'casas';
    }
    async function cargar() {
        try {
            const resp = await fetch('/Reserva/listar/propios', { credentials: 'include' });
            if (!resp.ok) throw new Error('No autorizado');
            reservas = await resp.json();
            mostrar();
        } catch(e) {
            const msg = document.getElementById('mensaje');
            msg.textContent = 'Error: ' + e.message;
            msg.style.display = 'block';
        } finally {
            fadeIn();
        }
    }

    function mostrar() {
        const lista = document.getElementById('lista');
        const filtradas = filtro === 'TODOS' ? reservas : reservas.filter(r => r.tipoEstado === filtro);

        if (filtradas.length === 0) {
            lista.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📅</div>
                    <p>No tenés reservas en este estado.</p>
                </div>`;
            return;
        }

        lista.innerHTML = filtradas.map((r, i) => `
            <div class="reserva-card" style="animation-delay:${i * 0.06}s">
                <div class="reserva-top">
                    <div>
                        <div class="reserva-id">Reserva #${r.id}</div>
                        <div class="reserva-titulo">${r.alojamiento?.titulo || 'Alojamiento ID: ' + r.idAlojamiento}</div>
                    </div>
                    <span class="estado-badge estado-${r.tipoEstado}">${r.tipoEstado}</span>
                </div>
                <div class="reserva-details">
                    <div class="detail-item">📅 <span>${r.fechaInicio}</span> → <span>${r.fechaFin}</span></div>
                    <div class="detail-item">💰 Total: <span>${r.precioTotal ? '$' + r.precioTotal : 'No calculado'}</span></div>
                </div>
           <div class="reserva-actions">
    <a class="btn-link" href="/detalle-alojamiento.html?id=${r.alojamiento?.id}&tipo=${getTipoUrl(r.alojamiento?.tipoInmueble)}">🏠 Ver alojamiento</a>

    <a class="btn-edit" href="/actualizar-reserva.html?id=${r.id}">✏️ Editar</a>
    ${r.tipoEstado !== 'CANCELADA' ? `<button class="btn-cancel" onclick="cancelar(${r.id})">Cancelar reserva</button>` : ''}
</div>
            </div>
        `).join('');
    }

    async function cancelar(id) {
        if (!confirm('¿Cancelar esta reserva?')) return;
        const resp = await fetch(`/Reserva/eliminar/${id}`, { method: 'DELETE', credentials: 'include' });
        if (resp.ok) {
            reservas = reservas.filter(r => r.id !== id);
            mostrar();
        } else {
            alert('No se pudo cancelar');
        }
    }

    function filtrar(estado, btn) {
        filtro = estado;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        mostrar();
    }

    function fadeIn() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }, 300);
    }

    cargar();
</script>
</body>
</html>
