<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0f1e; --surface: #111827; --border: #1e2d45; --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.2); --text: #e2e8f0; --muted: #64748b; --error: #f87171; --success: #4ade80; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; padding: 40px 20px; }
        body::before { content: ''; position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%); top: -150px; right: -150px; pointer-events: none; }
        .container { max-width: 560px; margin: 0 auto; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 28px; transition: color 0.2s; }
        .back-link:hover { color: var(--text); }
        /* Avatar header */
        .profile-header { text-align: center; margin-bottom: 32px; }
        .avatar { width: 72px; height: 72px; background: linear-gradient(135deg, #6366f1, var(--accent)); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 14px; }
        .profile-name { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 4px; }
        .profile-email { color: var(--muted); font-size: 14px; }
        .role-badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 20px; padding: 4px 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-top: 10px; }
        .role-ADMIN { background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.3); color: #a78bfa; }
        .role-ANFITRION { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }
        .role-CLIENTE { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
        /* Card */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; margin-bottom: 16px; animation: fadeUp 0.4s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .data-row:last-child { border-bottom: none; }
        .data-key { font-size: 13px; color: var(--muted); }
        .data-val { font-size: 14px; font-weight: 500; color: var(--text); }
        .data-val.empty { color: var(--muted); font-style: italic; font-weight: 400; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.active { background: var(--success); }
        .status-dot.inactive { background: var(--error); }
        /* Actions */
        .actions { display: flex; gap: 12px; margin-top: 4px; }
        .btn { flex: 1; background: linear-gradient(135deg, #6366f1, var(--accent)); border: none; border-radius: 10px; padding: 13px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.2s, transform 0.1s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn.outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn.outline:hover { border-color: var(--accent); color: var(--text); }
        /* Skeleton loader */
        .skeleton { background: var(--border); border-radius: 6px; height: 16px; width: 120px; animation: pulse 1.4s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
        .msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 20px; display: none; }
        .msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); display: block; }
    </style>
</head>
<body>
<div class="container">
    <a href="/home.html" class="back-link">← Volver al panel</a>

    <div class="profile-header">
        <div class="avatar" id="avatarIcon">👤</div>
        <div class="profile-name" id="profileName"><span class="skeleton" style="width:180px;display:inline-block;"></span></div>
        <div class="profile-email" id="profileEmail"><span class="skeleton" style="width:220px;margin-top:6px;display:inline-block;"></span></div>
        <div id="roleBadge"></div>
    </div>

    <div class="msg" id="msg"></div>

    <div class="card">
        <div class="section-title">Datos personales</div>
        <div class="data-row"><span class="data-key">Nombre</span><span class="data-val" id="dNombre">—</span></div>
        <div class="data-row"><span class="data-key">Email</span><span class="data-val" id="dEmail">—</span></div>
        <div class="data-row"><span class="data-key">Teléfono</span><span class="data-val" id="dTelefono">—</span></div>
        <div class="data-row"><span class="data-key">Estado</span><span class="data-val" id="dActivo">—</span></div>
    </div>

    <div class="card">
        <div class="section-title">Cuenta</div>
        <div class="data-row"><span class="data-key">ID</span><span class="data-val" id="dId">—</span></div>
        <div class="data-row"><span class="data-key">Rol</span><span class="data-val" id="dRol">—</span></div>
        <div class="data-row"><span class="data-key">Método de pago</span><span class="data-val" id="dMetodoPago">—</span></div>
        <div class="data-row"><span class="data-key">Matrícula</span><span class="data-val" id="dMatricula">—</span></div>
    </div>

    <div class="actions">
        <a href="/actualizar-perfil.html" class="btn">✏️ Editar perfil</a>
        <a href="/home.html" class="btn outline">← Panel</a>
    </div>
</div>

<script>
    const roleLabels = { ADMIN: '🔐 Administrador', ANFITRION: '🏠 Anfitrión', CLIENTE: '🧳 Cliente' };
    const roleEmojis = { ADMIN: '🔐', ANFITRION: '🏠', CLIENTE: '🧳' };

    function set(id, val, fallback = 'No especificado') {
        const el = document.getElementById(id);
        if (!el) return;
        if (val !== null && val !== undefined && val !== '') {
            el.textContent = val;
            el.classList.remove('empty');
        } else {
            el.textContent = fallback;
            el.classList.add('empty');
        }
    }

    async function cargarPerfil() {
        try {
            // Obtener datos del usuario logueado
            const meResp = await fetch('/Usuario/me', { credentials: 'include' });
            if (!meResp.ok) { window.location.href = '/login.html'; return; }
            const me = await meResp.json();

            // Cargar datos completos por ID
            const resp = await fetch(`/Usuario/mostrar/${me.id}`, { credentials: 'include' });
            if (!resp.ok) throw new Error('No se pudo obtener el perfil');
            const u = await resp.json();

            const rol = u.tipoUsuario || u.rol || '';
            const emoji = roleEmojis[rol] || '👤';

            document.getElementById('avatarIcon').textContent = emoji;
            document.getElementById('profileName').textContent = u.nombre || 'Sin nombre';
            document.getElementById('profileEmail').textContent = u.email || '';

            const badge = document.getElementById('roleBadge');
            badge.innerHTML = `<span class="role-badge role-${rol}">${roleLabels[rol] || rol}</span>`;

            set('dNombre', u.nombre);
            set('dEmail', u.email);
            set('dTelefono', u.telefono);
            set('dId', u.id);
            set('dRol', roleLabels[rol] || rol);
            set('dMetodoPago', u.metodoPago);
            set('dMatricula', u.matricula);

            const activoEl = document.getElementById('dActivo');
            const activo = u.activo !== false;
            activoEl.innerHTML = `<span class="status-dot ${activo ? 'active' : 'inactive'}"></span>${activo ? 'Activo' : 'Inactivo'}`;

        } catch (e) {
            const msg = document.getElementById('msg');
            msg.textContent = 'No se pudo cargar el perfil. Intentá recargar la página.';
            msg.style.display = 'block';
        }
    }

    cargarPerfil();
</script>
</body>
</html>
