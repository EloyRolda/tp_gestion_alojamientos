<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Perfil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0f1e; --surface: #111827; --border: #1e2d45; --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.2); --text: #e2e8f0; --muted: #64748b; --error: #f87171; --success: #4ade80; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        body::before { content: ''; position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%); top: -150px; right: -150px; pointer-events: none; }
        .container { width: 100%; max-width: 480px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
        .back-link:hover { color: var(--text); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; animation: fadeUp 0.4s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #6366f1, var(--accent)); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 14px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 4px; }
        .subtitle { color: var(--muted); font-size: 14px; }
        .field { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
            font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        input::placeholder { color: var(--muted); }
        .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
        .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
        .msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px; display: none; }
        .msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
        .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
        .btn { width: 100%; background: linear-gradient(135deg, #6366f1, var(--accent)); border: none; border-radius: 10px; padding: 14px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 4px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .logout-link { color: #fca5a5; text-decoration: none; font-size: 14px; transition: color 0.2s; }
        .logout-link:hover { color: #f87171; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-actions">
        <a href="/home.html" class="back-link">← Volver al panel</a>
        <a href="#" onclick="cerrarSesion()" class="logout-link">Cerrar sesión</a>
    </div>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">👤</div>
            <h1>Actualizar Perfil</h1>
            <p class="subtitle">Modificá solo los campos que querés cambiar</p>
        </div>

        <div class="msg" id="msg"></div>

        <div class="section-label">Datos personales</div>

        <div class="field">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre completo">
        </div>
        <div class="field">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="Ej: +54 9 11 1234-5678">
        </div>
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com">
        </div>

        <hr class="divider">
        <div class="section-label">Seguridad</div>

        <div class="field">
            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" placeholder="Dejá vacío para no cambiarla">
            <p class="hint">Mínimo 6 caracteres</p>
        </div>

        <hr class="divider">
        <div class="section-label">Pago</div>

        <div class="field">
            <label for="metodoPago">Método de pago</label>
            <input type="text" id="metodoPago" placeholder="Ej: Tarjeta de crédito, MercadoPago">
        </div>

        <button class="btn" id="submitBtn" onclick="enviar()">Guardar cambios</button>
    </div>
</div>

<script>
    // ==================== GUARD DE AUTENTICACIÓN ====================
    if (!localStorage.getItem('token')) {
        window.location.href = '/login.html';
    }

    // ==================== CERRAR SESIÓN ====================
    function cerrarSesion() {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
    }

    async function enviar() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        msg.style.display = 'none';

        const datos = {};
        const nombre = document.getElementById('nombre').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const metodoPago = document.getElementById('metodoPago').value.trim();

        if (nombre) datos.nombre = nombre;
        if (telefono) datos.telefono = telefono;
        if (email) datos.email = email;
        if (password) datos.password = password;
        if (metodoPago) datos.metodoPago = metodoPago;

        if (Object.keys(datos).length === 0) {
            msg.className = 'msg error';
            msg.textContent = 'Completá al menos un campo para actualizar.';
            msg.style.display = 'block';
            return;
        }

        btn.disabled = true; btn.textContent = 'Guardando...';
        try {
            const resp = await fetch('/Usuario/actualizar', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body: JSON.stringify(datos)
            });
            const texto = await resp.text();
            msg.className = resp.ok ? 'msg success' : 'msg error';
            msg.textContent = resp.ok ? '¡Perfil actualizado correctamente!' : 'Error: ' + texto;
        } catch {
            msg.className = 'msg error'; msg.textContent = 'No se pudo conectar con el servidor.';
        }
        msg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Guardar cambios';
    }
</script>
</body>
</html>
