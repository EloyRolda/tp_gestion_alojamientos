<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Reserva</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2435;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --text: #e2e8f0;
            --muted: #64748b;
            --error: #f87171;
            --success: #4ade80;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .app-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; }
        .btn-back {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 14px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; cursor: pointer;
            text-decoration: none; display: inline-block;
            transition: all 0.2s;
        }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); }
        .logout-link {
            color: #fca5a5;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.2s;
            margin-left: 12px;
        }
        .logout-link:hover { color: #f87171; border-color: #fca5a5; }

        /* ── MAIN ── */
        main {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            min-height: calc(100vh - 71px);
        }

        .container { width: 100%; max-width: 500px; }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
            animation: fadeUp 0.4s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .card-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px; font-weight: 600;
            margin-bottom: 4px;
        }
        .card-subtitle { color: var(--muted); font-size: 14px; }

        /* ── PREVIEW CARD del alojamiento ── */
        .aloj-preview {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: none;
            animation: fadeUp 0.3s ease both;
        }
        .aloj-preview.visible { display: block; }
        .aloj-preview-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .aloj-preview-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
        .aloj-preview-price { color: #4ade80; font-weight: 600; }

        /* ── FIELDS ── */
        .field { margin-bottom: 20px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

        label {
            display: block;
            font-size: 12px; font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        select, input[type="date"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            cursor: pointer;
        }
        select:focus, input[type="date"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        select option { background: var(--surface); }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6);
            cursor: pointer;
        }

        /* ── PRECIO ESTIMADO ── */
        .precio-estimado {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
        }
        .precio-estimado.visible { display: flex; align-items: center; justify-content: space-between; }
        .precio-label { color: var(--muted); }
        .precio-valor { font-size: 18px; font-weight: 600; color: #4ade80; }

        /* ── MSG ── */
        .msg {
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 20px; display: none;
        }
        .msg.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
        .msg.success { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.3);  color: var(--success); }

        /* ── BTN ── */
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border: none; border-radius: 10px;
            padding: 14px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo-icon">🏠</div>
        <span class="app-title">Gestión Alojamiento</span>
    </div>
    <div style="display:flex;align-items:center;">
        <a href="/listar-alojamientos.html" class="btn-back" id="btnBack">← Volver</a>
        <a href="#" onclick="cerrarSesion()" class="logout-link">Cerrar sesión</a>
    </div>
</header>

<main>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="card-icon">📅</div>
                <div class="card-title">Crear Reserva</div>
                <div class="card-subtitle">Elegí el alojamiento y las fechas</div>
            </div>

            <div class="msg" id="msg"></div>

            <!-- Preview fijo del alojamiento recibido por URL -->
            <div class="aloj-preview visible" id="alojPreview">
                <div class="aloj-preview-title" id="previewTitulo">Cargando...</div>
                <div class="aloj-preview-meta">
                    <span id="previewDireccion"></span>
                    <span class="aloj-preview-price" id="previewPrecio"></span>
                    <span id="previewCapacidad"></span>
                </div>
            </div>

            <!-- Fechas -->
            <div class="field-row">
                <div>
                    <label for="fechaInicio">Fecha de inicio</label>
                    <input type="date" id="fechaInicio" onchange="calcularPrecio()">
                </div>
                <div>
                    <label for="fechaFin">Fecha de fin</label>
                    <input type="date" id="fechaFin" onchange="calcularPrecio()">
                </div>
            </div>

            <!-- Precio estimado -->
            <div class="precio-estimado" id="precioEstimado">
                <span class="precio-label">Precio estimado</span>
                <span class="precio-valor" id="precioValor"></span>
            </div>

            <button class="btn" id="submitBtn" onclick="enviar()">Confirmar reserva</button>
        </div>
    </div>
</main>

<script>
    // ==================== GUARD DE AUTENTICACIÓN ====================
    if (!localStorage.getItem('token')) {
        window.location.href = '/login.html';
    }

    // ==================== CERRAR SESIÓN ====================
    function cerrarSesion() {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
    }

    // Parámetros de la URL — obligatorios
    const params = new URLSearchParams(location.search);
    const idAlojParam = params.get('idAlojamiento');
    const tipoParam   = params.get('tipo');

    // Guard: si no viene el alojamiento por URL, redirigir a la lista
    if (!idAlojParam || !tipoParam) {
        window.location.href = '/listar-alojamientos.html';
    }

    // Botón Volver apunta al detalle del alojamiento
    document.getElementById('btnBack').href =
        `/detalle-alojamiento.html?id=${idAlojParam}&tipo=${tipoParam}`;

    // Fechas mínimas: hoy
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('fechaInicio').min = hoy;
    document.getElementById('fechaFin').min = hoy;

    let idCliente = null;
    let alojamientoActual = null; // datos del alojamiento cargado

    function getAuthHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('token')
        };
    }

    async function cargarAlojamiento() {
        // Determinar endpoint según tipo
        const endpoints = { casas: 'Casa', hoteles: 'Hotel', departamentos: 'Departamento' };
        const recurso = endpoints[tipoParam];
        if (!recurso) {
            mostrarMsg('error', 'Tipo de alojamiento desconocido.');
            return;
        }

        try {
            const resp = await fetch(`/${recurso}/mostrar/${idAlojParam}`, { headers: getAuthHeaders() });
            if (!resp.ok) throw new Error('No se pudo cargar el alojamiento.');
            const data = await resp.json();
            const a = data.alojamiento || data;
            alojamientoActual = a;

            // Mostrar preview
            document.getElementById('previewTitulo').textContent = a.titulo || 'Sin título';
            const dir = a.direccion
                ? `${a.direccion.calle || ''} ${a.direccion.altura || ''}, ${a.direccion.ciudad || ''}`.trim()
                : '';
            document.getElementById('previewDireccion').textContent = dir ? `📍 ${dir}` : '';
            document.getElementById('previewPrecio').textContent =
                `$${parseFloat(a.precioNoche).toLocaleString('es-AR')}/noche`;
            document.getElementById('previewCapacidad').textContent =
                a.capacidad ? `👥 ${a.capacidad} personas` : '';
        } catch (e) {
            mostrarMsg('error', e.message || 'Error cargando el alojamiento.');
        }
    }

    function calcularPrecio() {
        const inicio = document.getElementById('fechaInicio').value;
        const fin    = document.getElementById('fechaFin').value;
        const estimado = document.getElementById('precioEstimado');

        if (!alojamientoActual || !inicio || !fin) {
            estimado.classList.remove('visible');
            return;
        }

        const dias = Math.round((new Date(fin) - new Date(inicio)) / (1000 * 60 * 60 * 24));
        if (dias <= 0) {
            estimado.classList.remove('visible');
            return;
        }

        const precio = parseFloat(alojamientoActual.precioNoche) * dias;
        document.getElementById('precioValor').textContent =
            `$${precio.toLocaleString('es-AR')} · ${dias} noche${dias !== 1 ? 's' : ''}`;
        estimado.classList.add('visible');
    }

    // Fecha fin mínima = fecha inicio
    document.getElementById('fechaInicio').addEventListener('change', function () {
        document.getElementById('fechaFin').min = this.value;
        if (document.getElementById('fechaFin').value < this.value) {
            document.getElementById('fechaFin').value = '';
        }
        calcularPrecio();
    });

    async function enviar() {
        const btn = document.getElementById('submitBtn');
        const fechaInicio = document.getElementById('fechaInicio').value;
        const fechaFin    = document.getElementById('fechaFin').value;

        if (!fechaInicio) { mostrarMsg('error', 'Ingresá la fecha de inicio.'); return; }
        if (!fechaFin)    { mostrarMsg('error', 'Ingresá la fecha de fin.');    return; }
        if (fechaFin <= fechaInicio) {
            mostrarMsg('error', 'La fecha de fin debe ser posterior a la de inicio.');
            return;
        }

        const datos = {
            idCliente,
            idAlojamiento: parseInt(idAlojParam),
            fechaInicio,
            fechaFin,
            tipoEstado: 'PENDIENTE'
        };

        btn.disabled = true; btn.textContent = 'Reservando...';
        try {
            const resp = await fetch('/Reserva/registrar', {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(datos)
            });
            const texto = await resp.text();
            if (resp.ok) {
                mostrarMsg('success', '¡Reserva creada correctamente! Redirigiendo...');
                setTimeout(() => window.location.href = '/mis-reservas.html', 2000);
            } else {
                mostrarMsg('error', 'Error: ' + texto);
                btn.disabled = false; btn.textContent = 'Confirmar reserva';
            }
        } catch {
            mostrarMsg('error', 'No se pudo conectar con el servidor.');
            btn.disabled = false; btn.textContent = 'Confirmar reserva';
        }
    }

    function mostrarMsg(tipo, texto) {
        const msg = document.getElementById('msg');
        msg.className = 'msg ' + tipo;
        msg.textContent = texto;
        msg.style.display = 'block';
    }

    // Inicialización
    fetch('/Usuario/me', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } })
        .then(r => r.json())
        .then(u => { idCliente = u.id; cargarAlojamiento(); })
        .catch(() => {});
</script>
</body>
</html>
