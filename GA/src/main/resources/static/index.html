<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Alojamiento</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --border: #1e2d45;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            top: -300px; left: -200px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
            bottom: -200px; right: -100px;
            pointer-events: none;
        }

        .hero {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeUp 0.5s ease both;
        }

        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* ✏️ TÍTULO — modificá este texto */
        .site-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        /* ✏️ SUBTÍTULO — modificá este texto */
        .site-subtitle {
            color: var(--muted);
            font-size: 16px;
            max-width: 360px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            max-width: 720px;
            width: 100%;
            animation: fadeUp 0.5s 0.1s ease both;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px 28px;
            width: 200px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .card-icon {
            font-size: 26px;
        }

        .card-label {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .card-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        .card.primary {
            border-color: rgba(59,130,246,0.3);
            background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(99,102,241,0.08));
        }

        .footer {
            margin-top: 48px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            animation: fadeUp 0.5s 0.2s ease both;
        }

        /* ✏️ LINK DE GITHUB — reemplazá el href con tu repo */
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            margin-top: 8px;
            transition: color 0.2s;
        }

        .github-link:hover { color: var(--text); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo-icon">🏠</div>
    <!-- ✏️ Cambiá el título y subtítulo acá -->
    <h1 class="site-title">Gestión Alojamiento</h1>
    <p class="site-subtitle">API REST para administración de alojamientos, reservas y usuarios.</p>
</div>

<div class="cards">

    <a href="/login.html" class="card primary">
        <div class="card-icon">🔑</div>
        <div class="card-label">Iniciar sesión</div>
        <div class="card-desc">Accedé a tu cuenta</div>
    </a>

    <a href="/registrarse.html" class="card">
        <div class="card-icon">✨</div>
        <div class="card-label">Registrarse</div>
        <div class="card-desc">Creá una cuenta nueva</div>
    </a>

    <a href="/swagger-ui/index.html" target="_blank" class="card">
        <div class="card-icon">📄</div>
        <div class="card-label">Swagger</div>
        <div class="card-desc">Explorá los endpoints</div>
    </a>

    <!-- ✏️ Reemplazá el href con la URL de tu repositorio -->
    <a href="https://github.com/EloyRolda/tp_gestion_alojamientos" target="_blank" class="card">
        <div class="card-icon">🐙</div>
        <div class="card-label">GitHub</div>
        <div class="card-desc">Ver código fuente</div>
    </a>

</div>

<div class="footer">
    <div>API REST · Spring Boot · Java</div>
    <!-- ✏️ Reemplazá el href con la URL de tu repositorio -->
    <a href="https://github.com/EloyRolda/tp_gestion_alojamientos" target="_blank" class="github-link">
        ⭐github.com/EloyRolda/tp_gestion_alojamientos
    </a>
</div>

</body>
</html>
