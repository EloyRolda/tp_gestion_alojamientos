<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelar Reserva</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0f1e; --surface: #111827; --border: #1e2d45; --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.2); --text: #e2e8f0; --muted: #64748b; --error: #f87171; --success: #4ade80; --warn: #fb923c; --warn-glow: rgba(251,146,60,0.2); }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        body::before { content: ''; position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(251,146,60,0.06) 0%, transparent 70%); top: -150px; right: -150px; pointer-events: none; }
        .container { width: 100%; max-width: 440px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 28px; transition: color 0.2s; }
        .back-link:hover { color: var(--text); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; animation: fadeUp 0.4s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #dc2626, var(--warn)); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 14px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 4px; }
        .subtitle { color: var(--muted); font-size: 14px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
        input[type="number"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        input:focus { border-color: var(--warn); box-shadow: 0 0 0 3px var(--warn-glow); }
        input::placeholder { color: var(--muted); }
        .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
        .warning-box { background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.25); border-radius: 10px; padding: 14px 16px; margin-bottom: 22px; font-size: 13px; color: var(--warn); display: flex; gap: 10px; align-items: flex-start; }
        .msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px; display: none; }
        .msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
        .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
        .btn { width: 100%; background: linear-gradient(135deg, #dc2626, var(--warn)); border: none; border-radius: 10px; padding: 14px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 4px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="/home.html" class="back-link">← Volver al panel</a>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🚫</div>
            <h1>Cancelar Reserva</h1>
            <p class="subtitle">Esta acción no se puede deshacer</p>
        </div>

        <div class="warning-box">
            <span>⚠️</span>
            <span>Al cancelar, la reserva quedará en estado <strong>CANCELADA</strong> y no podrá reactivarse desde esta pantalla.</span>
        </div>

        <div class="msg" id="msg"></div>

        <div class="field">
            <label for="idReserva">ID de la Reserva</label>
            <input type="number" id="idReserva" placeholder="Ej: 7" min="1" required>
            <p class="hint">Encontrás el ID al ver el detalle de tu reserva</p>
        </div>

        <button class="btn" id="submitBtn" onclick="cancelar()">Confirmar cancelación</button>
    </div>
</div>

<script>
    async function cancelar() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        msg.style.display = 'none';

        const id = document.getElementById('idReserva').value;
        if (!id || id < 1) {
            msg.className = 'msg error'; msg.textContent = 'Ingresá un ID de reserva válido.';
            msg.style.display = 'block'; return;
        }

        btn.disabled = true; btn.textContent = 'Cancelando...';
        try {
            const resp = await fetch(`/Reserva/eliminar/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            msg.className = resp.ok ? 'msg success' : 'msg error';
            msg.textContent = resp.ok ? '✓ Reserva cancelada correctamente.' : 'Error: no se pudo cancelar la reserva (verificá el ID).';
        } catch {
            msg.className = 'msg error'; msg.textContent = 'No se pudo conectar con el servidor.';
        }
        msg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Confirmar cancelación';
    }
</script>
</body>
</html>
