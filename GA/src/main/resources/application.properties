# Nombre de la aplicación
spring.application.name=GA

# Configuración de la base de datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_gestion_alojamientos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola (útil para debugear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto de la aplicación (opcional, por defecto es 8080)
server.port=8080